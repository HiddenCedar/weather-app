<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stratus — weather</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:"Inter","system-ui",sans-serif;
      background:#f5f5f0;
      color:#1c1917;
      min-height:100vh;
      padding:2.5rem;
    }

    /* ─── Header ─── */
    .top{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:2.5rem;
    }
    .top h1{
      font-size:1.25rem;font-weight:500;letter-spacing:-.03em;
    }
    .top h1 span{font-weight:700;color:#d97706}
    .top .tag{
      font-size:.7rem;color:#a8a29e;text-transform:uppercase;letter-spacing:.12em;
    }

    /* ─── Search ─── */
    .search-row{
      display:flex;align-items:center;gap:0;
      border-bottom:1.5px solid #1c1917;
      padding-bottom:.5rem;
      margin-bottom:2.5rem;
    }
    .search-row input{
      flex:1;
      border:none;background:transparent;
      padding:.25rem 0;font-size:.95rem;
      color:#1c1917;font-family:inherit;outline:none;
    }
    .search-row input::placeholder{color:#d6d3d1}
    .search-row button{
      border:none;background:transparent;
      font-size:.8rem;font-weight:500;color:#d97706;
      cursor:pointer;font-family:inherit;padding:.25rem 0;
    }
    .search-row button:disabled{opacity:.3;pointer-events:none}
    .search-hint{
      font-size:.65rem;color:#d6d3d1;margin-top:.25rem;margin-bottom:1.5rem;
    }

    /* ─── Error ─── */
    .err{
      font-size:.8rem;color:#dc2626;
      padding:.5rem 0;display:none;margin-bottom:1rem;
    }

    /* ─── Loader ─── */
    .load{display:none;padding:3rem 0;text-align:center}
    .load.active{display:block}
    .load span{display:inline-block;width:6px;height:6px;background:#d97706;margin:0 3px;animation:blink 1.2s infinite}
    .load span:nth-child(2){animation-delay:.2s}
    .load span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

    .empty{padding:3rem 0;color:#d6d3d1;font-size:.85rem}

    /* ═══════════════════════════════════════
       BENTO GRID
       ═══════════════════════════════════════ */
    .bento{
      display:grid;
      grid-template-columns:1fr .7fr;
      grid-template-rows:auto auto auto auto;
      gap:1px;
      background:#e7e5e4;
      border:1px solid #e7e5e4;
    }

    .bento > div{
      background:#fafaf9;
      padding:1.5rem;
    }

    /* city + temp block */
    .block-primary{
      grid-column:1 / 2;
      grid-row:1 / 3;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .block-primary .loc-name{
      font-size:.8rem;font-weight:600;text-transform:uppercase;
      letter-spacing:.1em;color:#a8a29e;margin-bottom:.25rem;
    }
    .block-primary .loc-sub{
      font-size:.7rem;color:#d6d3d1;margin-bottom:1.5rem;
    }
    .block-primary .big-temp{
      font-size:clamp(4rem,10vw,7rem);
      font-weight:700;letter-spacing:-.06em;line-height:.85;
    }
    .block-primary .big-temp .deg{
      font-size:1.5rem;font-weight:300;color:#d6d3d1;vertical-align:super;
    }
    .block-primary .condition{
      display:flex;align-items:center;gap:.5rem;
      font-size:.85rem;color:#57534e;margin-top:.5rem;
    }
    .block-primary .hi-lo{
      font-size:.75rem;color:#a8a29e;margin-top:.15rem;
    }

    /* rain timeline */
    .block-rain{
      grid-column:2 / 3;
      grid-row:1 / 2;
    }
    .block-rain .label{
      font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
      color:#a8a29e;margin-bottom:1rem;
    }
    .block-rain .label span{color:#d97706;font-weight:600}
    .rain-bars{
      display:flex;align-items:flex-end;gap:2px;
      height:80px;
    }
    .rain-bars .rb{
      flex:1;min-width:8px;
      background:#d6d3d1;border-radius:2px 2px 0 0;
      transition:.3s;position:relative;
    }
    .rain-bars .rb.has{background:#2563eb}
    .rain-bars .rb.heavy{background:#1d4ed8}
    .rain-bars .rb.moderate{background:#60a5fa}
    .rain-bars .rb.light{background:#93c5fd}
    .rain-labels{
      display:flex;gap:2px;margin-top:.25rem;
    }
    .rain-labels .rl{
      flex:1;font-size:.55rem;color:#d6d3d1;
      text-align:center;white-space:nowrap;overflow:hidden;
    }
    .rain-note{
      font-size:.65rem;color:#d6d3d1;margin-top:.5rem;
    }

    /* detail blocks */
    .block-d{
      padding:1.25rem 1.5rem;
    }
    .block-d .lbl{
      font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;
      color:#a8a29e;margin-bottom:.2rem;
    }
    .block-d .val{
      font-size:1.4rem;font-weight:600;letter-spacing:-.03em;
    }
    .block-d .sub{font-size:.7rem;color:#a8a29e;margin-top:.1rem}

    .block-humidity{grid-column:1;grid-row:3}
    .block-wind{grid-column:2;grid-row:3}
    .block-feels{grid-column:1;grid-row:4}
    .block-uv{grid-column:2;grid-row:4}

    /* forecast strip */
    .block-forecast{
      grid-column:1 / 3;
      grid-row:5;
    }
    .block-forecast .label{
      font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
      color:#a8a29e;margin-bottom:1rem;
    }
    .forecast-strip{
      display:flex;gap:0;
    }
    .forecast-strip .fd{
      flex:1;
      padding:.5rem 1rem .5rem 0;
      border-right:1px solid #e7e5e4;
      text-align:left;
    }
    .forecast-strip .fd:last-child{border-right:none;padding-right:0}
    .forecast-strip .fd .fd-day{
      font-size:.65rem;font-weight:600;text-transform:uppercase;
      letter-spacing:.08em;color:#a8a29e;margin-bottom:.3rem;
    }
    .forecast-strip .fd .fd-emoji{font-size:1.1rem;margin-bottom:.1rem}
    .forecast-strip .fd .fd-high{font-size:.85rem;font-weight:600}
    .forecast-strip .fd .fd-low{font-size:.65rem;color:#d6d3d1}

    .foot{
      margin-top:1.5rem;
      font-size:.6rem;color:#d6d3d1;text-transform:uppercase;letter-spacing:.12em;
    }

    @media(max-width:640px){
      body{padding:1rem}
      .bento{grid-template-columns:1fr}
      .block-primary{grid-column:1;grid-row:auto}
      .block-rain{grid-column:1;grid-row:auto}
      .block-humidity{grid-column:1;grid-row:auto}
      .block-wind{grid-column:1;grid-row:auto}
      .block-feels{grid-column:1;grid-row:auto}
      .block-uv{grid-column:1;grid-row:auto}
      .block-forecast{grid-column:1;grid-row:auto}
      .forecast-strip{overflow-x:auto}
      .forecast-strip .fd{min-width:70px}
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>◈ <span>stratus</span></h1>
    <span class="tag">weather</span>
  </div>

  <div class="search-row">
    <input type="text" id="q" placeholder="city, state, country, zip, pin code..." value="Tokyo" />
    <button id="go">Search</button>
  </div>
  <div class="search-hint" id="hint">Try: "London", "Mumbai 400001", "New York 10001", "Berlin, Germany"</div>

  <div class="err" id="err"></div>
  <div class="load" id="load"><span></span><span></span><span></span></div>

  <div id="content">
    <div class="empty">Search a place to see weather & rain forecast</div>
  </div>

  <div class="foot">powered by open-meteo</div>

  <script>
    const q=document.getElementById('q'),go=document.getElementById('go')
    const content=document.getElementById('content'),err=document.getElementById('err')
    const load=document.getElementById('load')

    function wmo(code){
      if(code===0)return['☀️','Clear']
      if(code<=3)return['⛅','Partly cloudy']
      if(code<=48)return['🌫','Foggy']
      if(code<=57)return['🌦','Drizzle']
      if(code<=67)return['🌧','Rain']
      if(code<=77)return['🌨','Snow']
      if(code<=82)return['🌦','Showers']
      if(code>=95)return['⛈','Storm']
      return['🌤','Fair']
    }

    function day(s){
      const d=new Date(s+'T12:00')
      const n=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      const t=new Date()
      return d.toDateString()===t.toDateString()?'Today':n[d.getDay()]
    }

    function showErr(m){err.textContent=m;err.style.display='block';setTimeout(()=>{err.style.display='none'},5000)}

    function rainLevel(mm){
      if(!mm||mm===0)return 0
      if(mm<0.5)return 1
      if(mm<2)return 2
      if(mm<6)return 3
      return 4
    }

    function rainClass(lvl){
      if(lvl===0)return''
      if(lvl===1)return'light'
      if(lvl===2)return'moderate'
      if(lvl>=3)return'heavy'
      return''
    }

    async function geo(query){
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=3&language=en&format=json`)
      if(!r.ok)throw new Error('Geocoding failed')
      const d=await r.json()
      if(!d.results||!d.results.length)throw new Error('No results. Try: "London", "Mumbai 400001", "New York"')
      return d.results[0]
    }

    async function wx(lat,lon){
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,uv_index&hourly=precipitation_probability,precipitation,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code,precipitation_probability_max&timezone=auto&forecast_days=7`)
      if(!r.ok)throw new Error('Weather API failed')
      return r.json()
    }

    function render(g,w){
      const c=w.current,d=w.daily,h=w.hourly
      const[e,l]=wmo(c.weather_code)

      // Rain timeline (next 12 hours)
      const pre=h.precipitation||[]
      let rainHtml='',rainNote='No rain expected in next 12h',hasRain=false
      const maxH=Math.max(...pre.slice(0,12).map(p=>p||0),0.5)
      for(let i=0;i<12;i++){
        const p=pre[i]||0
        const lvl=rainLevel(p)
        const ht=Math.max((p/maxH)*100,2)
        if(lvl>0){hasRain=true;rainNote=`Rain likely in ${i}h`}
        rainHtml+=`<div class="rb ${lvl>0?'has '+rainClass(lvl):''}" style="height:${ht}%"></div>`
      }
      const hrs=['Now','1h','2h','3h','4h','5h','6h','7h','8h','9h','10h','11h']
      const lblHtml=hrs.map(h=>`<span class="rl">${h}</span>`).join('')

      // Rain probability max today
      const todayRainProb=Math.round(d.precipitation_probability_max?.[0]||0)
      const rainToday=d.precipitation_sum?.[0]||0

      content.innerHTML=`
      <div class="bento">
        <div class="block-primary">
          <div>
            <div class="loc-name">${g.name}${g.admin1?', '+g.admin1:''}${g.country_code?', '+g.country_code:''}</div>
            <div class="loc-sub">${g.country}${g.elevation?' · '+g.elevation+'m':''}</div>
          </div>
          <div>
            <div class="big-temp">${Math.round(c.temperature_2m)}<span class="deg">°</span></div>
            <div class="condition">${e} ${l}</div>
            <div class="hi-lo">H ${Math.round(d.temperature_2m_max[0])}° · L ${Math.round(d.temperature_2m_min[0])}°</div>
          </div>
        </div>

        <div class="block-rain">
          <div class="label"><span>☔</span> rain forecast · next 12h</div>
          <div class="rain-bars">${rainHtml}</div>
          <div class="rain-labels">${lblHtml}</div>
          <div class="rain-note">${rainNote}</div>
        </div>

        <div class="block-d block-humidity">
          <div class="lbl">💧 humidity</div>
          <div class="val">${c.relative_humidity_2m}%</div>
          <div class="sub">${todayRainProb}% chance of rain today</div>
        </div>

        <div class="block-d block-wind">
          <div class="lbl">🌬 wind</div>
          <div class="val">${Math.round(c.wind_speed_10m)}</div>
          <div class="sub">km/h</div>
        </div>

        <div class="block-d block-feels">
          <div class="lbl">🌡 feels like</div>
          <div class="val">${Math.round(c.apparent_temperature)}°</div>
          <div class="sub">${c.apparent_temperature>c.temperature_2m?'warmer':'cooler'} than actual</div>
        </div>

        <div class="block-d block-uv">
          <div class="lbl">☀ uv index</div>
          <div class="val">${c.uv_index!==undefined?Math.round(c.uv_index):'—'}</div>
          <div class="sub">${c.uv_index<3?'low':c.uv_index<6?'moderate':c.uv_index<8?'high':'very high'}</div>
        </div>

        <div class="block-forecast">
          <div class="label">7-day forecast</div>
          <div class="forecast-strip">${d.time.map((_,i)=>i===0?'':`
            <div class="fd">
              <div class="fd-day">${day(d.time[i])}</div>
              <div class="fd-emoji">${wmo(d.weather_code[i])[0]}</div>
              <div class="fd-high">${Math.round(d.temperature_2m_max[i])}°</div>
              <div class="fd-low">${Math.round(d.temperature_2m_min[i])}°</div>
            </div>
          `).join('')}</div>
        </div>
      </div>`
    }

    async function search(query){
      if(!query.trim())return
      load.classList.add('active');go.disabled=true
      content.innerHTML='';err.style.display='none'
      try{
        const loc=await geo(query)
        const w=await wx(loc.latitude,loc.longitude)
        render(loc,w)
      }catch(e){
        showErr(e.message)
        content.innerHTML=`<div class="empty">${e.message}</div>`
      }
      load.classList.remove('active');go.disabled=false
    }

    go.addEventListener('click',()=>search(q.value.trim()))
    q.addEventListener('keydown',e=>{if(e.key==='Enter')search(q.value.trim())})
    search('Tokyo')
  </script>
</body>
</html>
