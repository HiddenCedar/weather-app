<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weather.</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:"Inter","system-ui",sans-serif;
      background:#fafaf9;
      color:#1c1917;
      min-height:100vh;
      padding:2rem 2.5rem;
    }

    .bar{
      display:flex;justify-content:space-between;align-items:baseline;
      border-bottom:2px solid #1c1917;
      padding-bottom:.75rem;
      margin-bottom:3rem;
    }
    .bar h1{
      font-size:1.1rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.15em;
    }
    .bar h1 span{color:#d97706}

    .search-line{
      display:flex;gap:0;margin-bottom:3rem;
      max-width:400px;
    }
    .search-line input{
      flex:1;
      border:2px solid #1c1917;border-right:none;
      padding:.6rem .8rem;font-size:.8rem;
      background:#fafaf9;color:#1c1917;
      font-family:inherit;
      outline:none;
    }
    .search-line input::placeholder{color:#a8a29e}
    .search-line button{
      border:2px solid #1c1917;
      background:#1c1917;color:#fafaf9;
      padding:.6rem 1.2rem;font-size:.75rem;
      font-weight:600;font-family:inherit;
      text-transform:uppercase;letter-spacing:.1em;
      cursor:pointer;transition:.15s;
    }
    .search-line button:hover{background:#d97706;border-color:#d97706}
    .search-line button:disabled{opacity:.3;pointer-events:none}

    .error{border-left:3px solid #dc2626;padding:.5rem .75rem;font-size:.8rem;color:#dc2626;margin-bottom:1.5rem;display:none}

    .loader{display:none;padding:2rem 0}
    .loader.active{display:block}
    .loader-dot{display:inline-block;width:8px;height:8px;background:#d97706;animation:blink 1s infinite}
    .loader-dot:nth-child(2){animation-delay:.2s}
    .loader-dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .empty-state{padding:3rem 0;color:#a8a29e;font-size:.9rem}

    .city-line{
      margin-bottom:1rem;
    }
    .city-line .name{
      font-size:1rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.1em;
    }
    .city-line .country{
      font-size:.75rem;color:#a8a29e;margin-left:.5rem;
    }

    .temp-row{
      display:flex;align-items:baseline;gap:0;
      margin-bottom:1rem;
    }
    .temp-number{
      font-size:clamp(5rem,15vw,10rem);
      font-weight:800;letter-spacing:-.06em;
      line-height:.85;
    }
    .temp-unit{
      font-size:1.5rem;font-weight:300;color:#a8a29e;
      margin-left:.2rem;
    }

    .condition-line{
      display:flex;align-items:center;gap:.5rem;
      font-size:.9rem;color:#57534e;margin-bottom:2rem;
    }
    .condition-line .emoji{font-size:1.3rem}
    .condition-line .hi-lo{color:#a8a29e;margin-left:.5rem}

    .detail-strip{
      display:flex;gap:0;
      border-top:2px solid #1c1917;
      border-bottom:2px solid #1c1917;
      margin-bottom:2.5rem;
    }
    .detail-strip .d{
      flex:1;
      padding:.75rem 1rem .75rem 0;
      border-right:1px solid #e7e5e4;
    }
    .detail-strip .d:last-child{border-right:none;padding-right:0}
    .detail-strip .d .lbl{
      font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;
      color:#a8a29e;margin-bottom:.15rem;
    }
    .detail-strip .d .val{
      font-size:1.1rem;font-weight:700;
    }

    .forecast-section .label{
      font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;
      color:#a8a29e;margin-bottom:1rem;
    }
    .forecast-scroll{
      display:flex;gap:0;overflow-x:auto;
      padding-bottom:.5rem;
      scrollbar-width:thin;scrollbar-color:#d97706 #e7e5e4;
    }
    .forecast-scroll .f-day{
      min-width:90px;flex-shrink:0;
      border-right:1px solid #e7e5e4;
      padding:.5rem 1rem .5rem 0;
    }
    .forecast-scroll .f-day:last-child{border-right:none}
    .forecast-scroll .f-day .day{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#1c1917;margin-bottom:.3rem}
    .forecast-scroll .f-day .f-emoji{font-size:1.2rem;margin-bottom:.15rem}
    .forecast-scroll .f-day .f-high{font-size:.9rem;font-weight:600}
    .forecast-scroll .f-day .f-low{font-size:.7rem;color:#a8a29e}

    .footer{
      margin-top:3rem;padding-top:1rem;
      border-top:1px solid #e7e5e4;
      font-size:.65rem;color:#a8a29e;text-transform:uppercase;letter-spacing:.1em;
    }

    @media(max-width:600px){
      body{padding:1rem}
      .detail-strip{flex-wrap:wrap}
      .detail-strip .d{flex:auto;width:50%;border-bottom:1px solid #e7e5e4;padding:.6rem .75rem .6rem 0}
      .detail-strip .d:nth-child(even){border-right:none}
      .detail-strip .d:nth-last-child(-n+2){border-bottom:none}
    }
  </style>
</head>
<body>
  <div class="bar">
    <h1>☁ <span>weather.</span></h1>
  </div>

  <div class="search-line">
    <input type="text" id="cityInput" placeholder="city name" value="Tokyo" />
    <button id="searchBtn">Search</button>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="loader" id="loader">
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
  </div>

  <div id="weatherContent">
    <div class="empty-state">Search a city to see the weather</div>
  </div>

  <div class="footer">Data from open-meteo.com</div>

  <script>
    const cityInput=document.getElementById('cityInput')
    const searchBtn=document.getElementById('searchBtn')
    const weatherContent=document.getElementById('weatherContent')
    const errorMsg=document.getElementById('errorMsg')
    const loader=document.getElementById('loader')

    function weatherInfo(code){
      if(code===0)return['☀️','Clear sky']
      if(code<=3)return['⛅','Partly cloudy']
      if(code<=48)return['🌫','Foggy']
      if(code<=57)return['🌦','Drizzle']
      if(code<=67)return['🌧','Rain']
      if(code<=77)return['🌨','Snow']
      if(code<=82)return['🌦','Rain showers']
      if(code>=95)return['⛈','Thunderstorm']
      return['🌤','Fair']
    }

    function dayName(dateStr){
      const d=new Date(dateStr+'T12:00:00')
      const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      const today=new Date()
      if(d.toDateString()===today.toDateString())return'Today'
      return days[d.getDay()]
    }

    function showError(msg){
      errorMsg.textContent=msg;errorMsg.style.display='block'
      setTimeout(()=>{errorMsg.style.display='none'},4000)
    }

    async function geocode(city){
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`)
      if(!r.ok)throw new Error('Geocoding failed')
      const d=await r.json()
      if(!d.results||!d.results.length)throw new Error(`City "${city}" not found`)
      return d.results[0]
    }

    async function getWeather(lat,lon){
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_gusts_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code&timezone=auto`)
      if(!r.ok)throw new Error('Weather API failed')
      return r.json()
    }

    function render(geo,w){
      const c=w.current,d=w.daily
      const[emoji,label]=weatherInfo(c.weather_code)

      let html=`
      <div class="city-line">
        <span class="name">${geo.name}${geo.admin1?', '+geo.admin1:''}</span>
        <span class="country">${geo.country}</span>
      </div>

      <div class="temp-row">
        <span class="temp-number">${Math.round(c.temperature_2m)}</span>
        <span class="temp-unit">°C</span>
      </div>

      <div class="condition-line">
        <span class="emoji">${emoji}</span>
        <span>${label}</span>
        <span class="hi-lo">H:${Math.round(d.temperature_2m_max[0])}° L:${Math.round(d.temperature_2m_min[0])}°</span>
      </div>

      <div class="detail-strip">
        <div class="d"><div class="lbl">Humidity</div><div class="val">${c.relative_humidity_2m}%</div></div>
        <div class="d"><div class="lbl">Wind</div><div class="val">${Math.round(c.wind_speed_10m)} km/h</div></div>
        <div class="d"><div class="lbl">Feels like</div><div class="val">${Math.round(c.apparent_temperature)}°</div></div>
        <div class="d"><div class="lbl">Precip</div><div class="val">${c.precipitation||'0'} mm</div></div>
      </div>

      <div class="forecast-section">
        <div class="label">7-day forecast</div>
        <div class="forecast-scroll">`

      for(let i=1;i<d.time.length;i++){
        const[e]=weatherInfo(d.weather_code[i])
        html+=`
        <div class="f-day">
          <div class="day">${dayName(d.time[i])}</div>
          <div class="f-emoji">${e}</div>
          <div class="f-high">${Math.round(d.temperature_2m_max[i])}°</div>
          <div class="f-low">${Math.round(d.temperature_2m_min[i])}°</div>
        </div>`
      }

      html+=`</div></div>`
      weatherContent.innerHTML=html
    }

    async function search(city){
      if(!city.trim())return
      loader.classList.add('active');searchBtn.disabled=true
      weatherContent.innerHTML='';errorMsg.style.display='none'
      try{
        const g=await geocode(city)
        const w=await getWeather(g.latitude,g.longitude)
        render(g,w)
      }catch(e){
        showError(e.message)
        weatherContent.innerHTML=`<div class="empty-state">${e.message}</div>`
      }
      loader.classList.remove('active');searchBtn.disabled=false
    }

    document.querySelector('.search-line').addEventListener('submit',e=>{e.preventDefault();search(cityInput.value.trim())})
    searchBtn.addEventListener('click',()=>search(cityInput.value.trim()))
    cityInput.addEventListener('keydown',e=>{if(e.key==='Enter')search(cityInput.value.trim())})
    search('Tokyo')
  </script>
</body>
</html>
