<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky — Weather App</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:"Inter","system-ui",sans-serif;
      background:linear-gradient(135deg,#0b0e1a 0%,#1a1a2e 50%,#0f1923 100%);
      color:#ececec;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:1rem;
    }

    .app{
      width:100%;max-width:560px;
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      padding:2rem;
    }

    .app-header{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:1.5rem;
    }
    .app-header h1{
      font-size:1.2rem;font-weight:700;letter-spacing:-.03em;
    }
    .app-header h1 span{color:#0ea5e9}

    .search-wrap{
      display:flex;gap:.5rem;margin-bottom:2rem;
    }
    .search-wrap input{
      flex:1;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;padding:.75rem 1rem;
      color:#ececec;font-size:.9rem;outline:none;transition:.2s;
    }
    .search-wrap input::placeholder{color:#444}
    .search-wrap input:focus{border-color:#0ea5e966}
    .search-wrap button{
      padding:.75rem 1.25rem;border-radius:12px;
      border:none;background:#0ea5e9;color:#fff;
      font-size:.85rem;font-weight:600;cursor:pointer;
      transition:.2s;white-space:nowrap;
    }
    .search-wrap button:hover{opacity:.85}
    .search-wrap button:disabled{opacity:.4;pointer-events:none}

    /* ─── Current Weather ─── */
    .current{
      text-align:center;padding:1rem 0 1.5rem;
    }
    .current .city{
      font-size:1.3rem;font-weight:600;margin-bottom:.3rem;
    }
    .current .country{
      font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:.1em;
    }
    .current .temp{
      font-size:4rem;font-weight:700;letter-spacing:-.04em;
      margin:.5rem 0;
    }
    .current .desc{
      font-size:.9rem;color:#888;
    }
    .current .high-low{
      font-size:.8rem;color:#555;margin-top:.3rem;
    }

    /* ─── Details Grid ─── */
    .details{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:.75rem;
      margin-bottom:1.5rem;
    }
    .detail-item{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.04);
      border-radius:12px;padding:.8rem;text-align:center;
    }
    .detail-item .icon{font-size:1.2rem;margin-bottom:.25rem}
    .detail-item .val{font-size:1rem;font-weight:600}
    .detail-item .lbl{font-size:.65rem;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

    /* ─── Forecast ─── */
    .forecast-title{
      font-size:.8rem;font-weight:600;margin-bottom:.75rem;
      color:#888;text-transform:uppercase;letter-spacing:.1em;
    }
    .forecast{
      display:flex;gap:.5rem;
    }
    .forecast-day{
      flex:1;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.04);
      border-radius:12px;padding:.75rem .5rem;
      text-align:center;
    }
    .forecast-day .day-name{font-size:.65rem;color:#888;margin-bottom:.3rem;font-weight:600}
    .forecast-day .day-icon{font-size:1.2rem;margin-bottom:.2rem}
    .forecast-day .day-high{font-size:.8rem;font-weight:600}
    .forecast-day .day-low{font-size:.65rem;color:#555}

    /* ─── Error / Empty ─── */
    .message{
      text-align:center;padding:2rem 0;color:#555;font-size:.85rem;line-height:1.6;
    }
    .message .big{font-size:2.5rem;margin-bottom:.5rem}
    .error-message{
      text-align:center;padding:.75rem;border-radius:8px;
      background:#ef444422;color:#ef4444;font-size:.8rem;
      margin-bottom:1rem;display:none;
    }

    /* ─── Loader ─── */
    .loader{
      display:none;justify-content:center;padding:3rem 0;
    }
    .loader.active{display:flex}
    .spinner{
      width:32px;height:32px;border:3px solid rgba(255,255,255,.06);
      border-top-color:#0ea5e9;border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:500px){
      .app{padding:1.25rem}
      .details{grid-template-columns:1fr 1fr}
      .forecast{flex-wrap:wrap}
      .forecast-day{min-width:calc(33% - .4rem)}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <h1>☁ <span>Sky</span></h1>
    </div>

    <form class="search-wrap" id="searchForm">
      <input type="text" id="cityInput" placeholder="Search a city..." value="Tokyo" />
      <button type="submit" id="searchBtn">Search</button>
    </form>

    <div class="error-message" id="errorMsg"></div>
    <div class="loader" id="loader"><div class="spinner"></div></div>

    <div id="weatherContent">
      <div class="message">
        <div class="big">🌤</div>
        Search a city to see the weather
      </div>
    </div>
  </div>

  <script>
    const searchForm = document.getElementById('searchForm')
    const cityInput = document.getElementById('cityInput')
    const searchBtn = document.getElementById('searchBtn')
    const weatherContent = document.getElementById('weatherContent')
    const errorMsg = document.getElementById('errorMsg')
    const loader = document.getElementById('loader')

    // ─── Weather code → emoji + label ───
    function weatherInfo(code){
      if(code === 0) return ['☀️', 'Clear sky']
      if(code <= 3)  return ['⛅', 'Partly cloudy']
      if(code <= 48) return ['🌫', 'Foggy']
      if(code <= 57) return ['🌦', 'Drizzle']
      if(code <= 67) return ['🌧', 'Rain']
      if(code <= 77) return ['🌨', 'Snow']
      if(code <= 82) return ['🌦', 'Rain showers']
      if(code >= 95) return ['⛈', 'Thunderstorm']
      return ['🌤', 'Fair']
    }

    // ─── Day name ───
    function dayName(dateStr){
      const d = new Date(dateStr + 'T12:00:00')
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
      const today = new Date()
      if(d.toDateString() === today.toDateString()) return 'Today'
      return days[d.getDay()]
    }

    // ─── Show error ───
    function showError(msg){
      errorMsg.textContent = msg
      errorMsg.style.display = 'block'
      setTimeout(() => { errorMsg.style.display = 'none' }, 4000)
    }

    // ─── Geocode city → lat/lon ───
    async function geocode(city){
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`)
      if(!r.ok) throw new Error('Geocoding API failed')
      const data = await r.json()
      if(!data.results || data.results.length === 0) throw new Error(`City "${city}" not found`)
      return data.results[0]
    }

    // ─── Fetch weather ───
    async function getWeather(lat, lon){
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_gusts_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code&timezone=auto`)
      if(!r.ok) throw new Error('Weather API failed')
      return r.json()
    }

    // ─── Render ───
    function renderWeather(geo, weather){
      const c = weather.current
      const d = weather.daily
      const [emoji, label] = weatherInfo(c.weather_code)

      // Current
      let html = `
      <div class="current">
        <div class="city">${geo.name}${geo.admin1 ? ', ' + geo.admin1 : ''}</div>
        <div class="country">${geo.country}</div>
        <div class="temp">${Math.round(c.temperature_2m)}°</div>
        <div class="desc">${emoji} ${label}</div>
        <div class="high-low">H: ${Math.round(d.temperature_2m_max[0])}°  L: ${Math.round(d.temperature_2m_min[0])}°</div>
      </div>

      <div class="details">
        <div class="detail-item">
          <div class="icon">💧</div>
          <div class="val">${c.relative_humidity_2m}%</div>
          <div class="lbl">Humidity</div>
        </div>
        <div class="detail-item">
          <div class="icon">🌬</div>
          <div class="val">${Math.round(c.wind_speed_10m)}</div>
          <div class="lbl">Wind km/h</div>
        </div>
        <div class="detail-item">
          <div class="icon">🌡</div>
          <div class="val">${Math.round(c.apparent_temperature)}°</div>
          <div class="lbl">Feels like</div>
        </div>
      </div>

      <div class="forecast-title">7-Day Forecast</div>
      <div class="forecast">`

      for(let i = 1; i < d.time.length; i++){
        const [e, l] = weatherInfo(d.weather_code[i])
        html += `
        <div class="forecast-day">
          <div class="day-name">${dayName(d.time[i])}</div>
          <div class="day-icon">${e}</div>
          <div class="day-high">${Math.round(d.temperature_2m_max[i])}°</div>
          <div class="day-low">${Math.round(d.temperature_2m_min[i])}°</div>
        </div>`
      }

      html += `</div>`
      weatherContent.innerHTML = html
    }

    // ─── Search flow ───
    async function searchCity(city){
      if(!city.trim()) return
      loader.classList.add('active')
      searchBtn.disabled = true
      weatherContent.innerHTML = ''
      errorMsg.style.display = 'none'

      try {
        const geo = await geocode(city)
        const weather = await getWeather(geo.latitude, geo.longitude)
        renderWeather(geo, weather)
      } catch(e){
        showError(e.message)
        weatherContent.innerHTML = `
          <div class="message">
            <div class="big">😕</div>
            ${e.message}<br>Try another city
          </div>`
      }

      loader.classList.remove('active')
      searchBtn.disabled = false
    }

    // ─── Events ───
    searchForm.addEventListener('submit', e => {
      e.preventDefault()
      searchCity(cityInput.value.trim())
    })

    // ─── Auto-load ───
    searchCity('Tokyo')
  </script>
</body>
</html>
